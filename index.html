<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VJ Pults — Skaņa & Krāsa</title>
<style>
  :root{
    --dark: #1F4E79;
    --dark-deep: #12324f;
    --orange: #C75000;
    --orange-light: #e8722c;
    --panel-bg: #0d1b26;
    --canvas-bg: #060a0e;
    --text: #f1ede4;
    --text-dim: #9fb3c2;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;overflow:hidden;
    font-family:'Candara','Segoe UI',sans-serif;
    background:var(--canvas-bg);color:var(--text);
    touch-action:manipulation;
  }
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}
 
  /* ---------- TOP BAR ---------- */
  #topbar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
    padding:8px 14px;background:linear-gradient(180deg,var(--dark) 0%,var(--dark-deep) 100%);
    border-bottom:2px solid var(--orange);z-index:20;flex:0 0 auto;
  }
  #logo{font-size:18px;font-weight:bold;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
  #logo .dot{width:9px;height:9px;border-radius:50%;background:var(--orange);display:inline-block;}
  #modeSwitch{display:flex;background:rgba(0,0,0,.25);border-radius:20px;padding:3px;gap:2px;}
  .modeBtn{
    border:none;background:transparent;color:var(--text-dim);font-family:inherit;font-size:12px;
    font-weight:bold;padding:8px 12px;border-radius:16px;cursor:pointer;white-space:nowrap;
  }
  .modeBtn.active{background:var(--orange);color:#fff;}
  #topbtns{display:flex;gap:6px;}
  .iconbtn{
    background:var(--orange);color:#fff;border:none;border-radius:10px;
    padding:9px 12px;font-size:13px;font-family:inherit;font-weight:bold;
    cursor:pointer;transition:transform .1s, background .2s;
  }
  .iconbtn:active{transform:scale(.94);background:var(--orange-light);}
  .iconbtn.ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);}
 
  /* ---------- STAGE ---------- */
  #stage{position:relative;flex:1 1 auto;overflow:hidden;background:#000;}
  #bgLayer{position:absolute;inset:0;transition:background 1.2s ease;}
  .fadeImg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.1s ease;}
  .pulseSlow{animation:pulseAnim 14s ease-in-out infinite;}
  .pulseMed{animation:pulseAnim 8s ease-in-out infinite;}
  .pulseFast{animation:pulseAnim 4s ease-in-out infinite;}
  @keyframes pulseAnim{0%,100%{transform:scale(1);}50%{transform:scale(1.045);}}
  #shapeCanvas{position:absolute;inset:0;width:100%;height:100%;}
  #colorOverlay{position:absolute;inset:0;pointer-events:none;transition:background .4s ease, opacity .3s ease;}
  #drawCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}
 
  /* ---------- PANEL ---------- */
  #panel{
    flex:0 0 auto;background:var(--panel-bg);border-top:2px solid var(--orange);
    max-height:50vh;display:flex;flex-direction:column;transform:translateY(0);
    transition:transform .25s ease;z-index:20;
  }
  #panel.hidden{transform:translateY(100%);position:absolute;bottom:0;left:0;right:0;}
  #tabs{display:flex;overflow-x:auto;background:var(--dark-deep);flex:0 0 auto;}
  .tab{
    flex:1 0 auto;padding:11px 8px;text-align:center;font-size:13px;font-weight:bold;
    color:var(--text-dim);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;
  }
  .tab.active{color:var(--text);border-bottom-color:var(--orange);background:rgba(199,80,0,.12);}
  #tabContent{flex:1 1 auto;overflow-y:auto;padding:14px 16px 20px;}
  .section{display:none;}
  .section.active{display:block;}
 
  .rowlabel{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin:14px 0 6px;}
  .rowlabel:first-child{margin-top:0;}
 
  .layerHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .layerHead .name{font-size:15px;font-weight:bold;}
  .onoff{
    display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);
    padding:6px 12px;border-radius:16px;cursor:pointer;border:1px solid rgba(255,255,255,.15);
  }
  .onoff .knob{width:16px;height:16px;border-radius:50%;background:#555;transition:background .2s;}
  .onoff.on .knob{background:var(--orange-light);}
  .onoff .lbl{font-size:12px;color:var(--text-dim);}
 
  /* Audio tracks */
  .track{
    display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:8px 10px;margin-bottom:8px;
  }
  .track .playBtn{
    width:42px;height:42px;flex:0 0 auto;border-radius:50%;border:none;
    background:var(--orange);color:#fff;font-size:16px;cursor:pointer;display:flex;
    align-items:center;justify-content:center;
  }
  .track.playing .playBtn{background:var(--dark);box-shadow:0 0 0 3px var(--orange-light);}
  .track .tname{flex:1 1 auto;font-size:14px;font-weight:bold;}
  .track input[type=range]{width:70px;}
  .vizbar{width:6px;height:20px;background:rgba(255,255,255,.15);border-radius:3px;flex:0 0 auto;overflow:hidden;position:relative;}
  .vizbar i{position:absolute;bottom:0;left:0;right:0;background:var(--orange-light);height:0%;}
 
  /* swatch grid */
  .swatches{display:flex;flex-wrap:wrap;gap:10px;}
  .swatch{
    width:52px;height:52px;border-radius:10px;cursor:pointer;border:3px solid transparent;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;text-align:center;
  }
  .swatch.selected{border-color:var(--orange);}
 
  /* buttons grid (choices) */
  .btngrid{display:flex;flex-wrap:wrap;gap:8px;}
  .choice{
    padding:10px 14px;border-radius:20px;background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.15);color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;
  }
  .choice.selected{background:var(--orange);border-color:var(--orange);font-weight:bold;}
 
  .sliderRow{display:flex;align-items:center;gap:10px;margin:8px 0;}
  .sliderRow label{width:110px;font-size:13px;color:var(--text-dim);flex:0 0 auto;}
  .sliderRow input[type=range]{flex:1 1 auto;}
  .sliderRow input[type=color]{width:44px;height:34px;border:none;border-radius:8px;background:none;padding:0;}
 
  select{
    background:rgba(255,255,255,.06);color:var(--text);border:1px solid rgba(255,255,255,.2);
    border-radius:8px;padding:8px 10px;font-family:inherit;font-size:14px;
  }
 
  .speedRow{display:flex;align-items:center;gap:10px;margin:8px 0;}
  .speedRow label{width:110px;font-size:13px;color:var(--text-dim);flex:0 0 auto;}
  .speedgrid{display:flex;gap:6px;flex:1 1 auto;}
  .speedBtn{
    flex:1 1 auto;padding:8px 4px;text-align:center;border-radius:8px;background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.15);color:var(--text-dim);font-family:inherit;font-size:12px;cursor:pointer;
  }
  .speedBtn.selected{background:var(--dark);color:#fff;border-color:var(--orange-light);}
 
  /* image picker UI */
  .imgSlotBlock{border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px;margin-bottom:14px;background:rgba(255,255,255,.03);}
  .imgSlotTitle{font-weight:bold;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .imgSlotTitle .swDot{width:12px;height:12px;border-radius:50%;}
  .catChips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .catChip{
    padding:6px 12px;border-radius:14px;background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.15);color:var(--text-dim);font-family:inherit;
    font-size:12px;cursor:pointer;
  }
  .catChip.active{background:var(--dark);color:#fff;border-color:var(--orange-light);}
  .thumbGrid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .thumb{
    width:60px;height:60px;border-radius:8px;background-size:cover;background-position:center;
    cursor:pointer;border:3px solid transparent;position:relative;
  }
  .thumb.selected{border-color:var(--orange);}
  .thumb.none{
    display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);
    color:var(--text-dim);font-size:11px;border:1px dashed rgba(255,255,255,.25);
  }
 
  .drawColors{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .dcol{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;}
  .dcol.selected{border-color:#fff;}
 
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:var(--orange);border-radius:3px;}
</style>
</head>
<body>
<div id="app">
 
  <div id="topbar">
    <div id="logo"><span class="dot"></span> VJ PULTS</div>
    <div id="modeSwitch">
      <button class="modeBtn active" data-mode="guided">Daļēja interpretācija</button>
      <button class="modeBtn" data-mode="free">Brīva interpretācija</button>
    </div>
    <div id="topbtns">
      <button class="iconbtn ghost" id="clearBtn">Notīrīt</button>
      <button class="iconbtn ghost" id="fsBtn">⛶</button>
      <button class="iconbtn" id="panelToggle">Panelis ▾</button>
    </div>
  </div>
 
  <div id="stage">
    <div id="bgLayer"></div>
 
    <!-- guided image crossfade -->
    <div class="fadeImg" id="imgGuideA"></div>
    <div class="fadeImg" id="imgGuideB"></div>
 
    <!-- free image slots -->
    <div class="fadeImg" id="imgFreeA"></div>
    <div class="fadeImg" id="imgFreeB"></div>
 
    <canvas id="shapeCanvas"></canvas>
    <div id="colorOverlay"></div>
    <canvas id="drawCanvas"></canvas>
  </div>
 
  <div id="panel">
    <div id="tabs">
      <div class="tab active" data-tab="audio">🎵 Skaņa</div>
      <div class="tab" data-tab="bg">🌌 Fons</div>
      <div class="tab" data-tab="image">🖼️ Attēli</div>
      <div class="tab" data-tab="color">🎨 Krāsa</div>
      <div class="tab" data-tab="shape">◆ Figūras</div>
      <div class="tab" data-tab="draw" id="drawTab">✏️ Zīmēšana</div>
    </div>
    <div id="tabContent">
 
      <div class="section active" id="sec-audio">
        <div class="rowlabel">Skaņu celiņi — spied, lai atskaņotu / apturētu</div>
        <div id="trackList"></div>
      </div>
 
      <div class="section" id="sec-bg">
        <div class="rowlabel">Fona krāsa / gradients</div>
        <div class="swatches" id="bgSwatches"></div>
        <div class="sliderRow">
          <label>Sava krāsa</label>
          <input type="color" id="bgCustom" value="#1F4E79">
        </div>
      </div>
 
      <div class="section" id="sec-image">
        <div class="layerHead">
          <div class="name">Attēlu celiņš</div>
          <div class="onoff on" id="imgToggle"><span class="knob"></span><span class="lbl">Redzams</span></div>
        </div>
 
        <div id="imgGuidedUI">
          <div class="rowlabel">Kategorija</div>
          <div class="catChips" id="guideCatChips"></div>
          <div class="sliderRow"><label>Caurspīdīgums</label><input type="range" id="guideOpacity" min="0" max="100" value="75"></div>
          <div class="speedRow"><label>Maiņas ātrums</label><div class="speedgrid" id="guideSpeed"></div></div>
        </div>
 
        <div id="imgFreeUI" style="display:none;">
          <div id="imgSlotA" class="imgSlotBlock"></div>
          <div id="imgSlotB" class="imgSlotBlock"></div>
        </div>
      </div>
 
      <div class="section" id="sec-color">
        <div class="layerHead">
          <div class="name">Krāsu celiņš</div>
          <div class="onoff" id="colorToggle"><span class="knob"></span><span class="lbl">Paslēpts</span></div>
        </div>
        <div class="sliderRow">
          <label>Krāsa</label>
          <input type="color" id="colorPick" value="#C75000">
        </div>
        <div class="sliderRow">
          <label>Sajaukšana</label>
          <select id="colorBlend">
            <option value="normal">Parasts</option>
            <option value="multiply">Reizināt (tumšāks)</option>
            <option value="screen" selected>Ekrāns (gaišāks)</option>
            <option value="overlay">Pārklājums</option>
            <option value="color-dodge">Izgaismojums</option>
            <option value="difference">Kontrasts</option>
          </select>
        </div>
        <div class="sliderRow">
          <label>Caurspīdīgums</label>
          <input type="range" id="colorOpacity" min="10" max="90" value="40">
        </div>
      </div>
 
      <div class="section" id="sec-shape">
        <div class="layerHead">
          <div class="name">Figūru celiņš</div>
          <div class="onoff on" id="shapeToggle"><span class="knob"></span><span class="lbl">Redzams</span></div>
        </div>
 
        <div id="shapeGuidedUI">
          <div class="rowlabel">Kustības veids</div>
          <div class="btngrid" id="guideMotionChoices">
            <button class="choice selected" data-motion="sides">No sāniem</button>
            <button class="choice" data-motion="spiral">Spirāle no centra</button>
            <button class="choice" data-motion="corners">No stūriem uz centru</button>
          </div>
        </div>
 
        <div id="shapeFreeUI" style="display:none;">
          <div class="rowlabel">Figūras veids</div>
          <div class="btngrid" id="shapeChoices">
            <button class="choice" data-shape="none">Nav</button>
            <button class="choice selected" data-shape="circles">Apļi</button>
            <button class="choice" data-shape="triangles">Trīsstūri</button>
            <button class="choice" data-shape="waves">Viļņi</button>
            <button class="choice" data-shape="rings">Riņķi</button>
            <button class="choice" data-shape="lines">Līnijas</button>
          </div>
          <div class="sliderRow"><label>Reaģē uz skaņu</label><input type="checkbox" id="shapeReactive" checked style="width:22px;height:22px;"></div>
        </div>
 
        <div class="sliderRow">
          <label>Krāsa</label>
          <input type="color" id="shapeColor" value="#e8722c">
        </div>
        <div class="sliderRow">
          <label>Sajaukšana</label>
          <select id="shapeBlend">
            <option value="normal">Parasts</option>
            <option value="screen" selected>Ekrāns (gaišāks)</option>
            <option value="multiply">Reizināt (tumšāks)</option>
            <option value="overlay">Pārklājums</option>
            <option value="difference">Kontrasts</option>
          </select>
        </div>
        <div class="sliderRow">
          <label>Caurspīdīgums</label>
          <input type="range" id="shapeOpacity" min="10" max="100" value="80">
        </div>
        <div class="sliderRow">
          <label>Skaits / izmērs</label>
          <input type="range" id="shapeCount" min="4" max="40" value="16">
        </div>
        <div class="speedRow"><label>Kustības ātrums</label><div class="speedgrid" id="shapeSpeed"></div></div>
      </div>
 
      <div class="section" id="sec-draw">
        <div class="layerHead">
          <div class="name">Zīmēšanas celiņš</div>
          <div class="onoff on" id="drawToggle"><span class="knob"></span><span class="lbl">Redzams</span></div>
        </div>
        <div class="rowlabel">Krāsa</div>
        <div class="drawColors" id="drawColors"></div>
        <div class="sliderRow"><label>Otas biezums</label><input type="range" id="brushSize" min="2" max="40" value="10"></div>
        <div class="sliderRow"><label>Caurspīdīgums</label><input type="range" id="drawOpacity" min="20" max="100" value="100"></div>
        <div class="btngrid" style="margin-top:10px;">
          <button class="choice selected" id="penMode">✏️ Zīmēt</button>
          <button class="choice" id="eraserMode">🧽 Dzēst</button>
          <button class="choice" id="clearDraw">🗑️ Notīrīt zīmējumu</button>
        </div>
      </div>
 
    </div>
  </div>
</div>
 
<script>
(function(){
  "use strict";
 
  let MODE = 'guided'; // 'guided' | 'free'
 
  /* ============ MODE SWITCH ============ */
  document.querySelectorAll('.modeBtn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      MODE = btn.dataset.mode;
      document.querySelectorAll('.modeBtn').forEach(b=>b.classList.toggle('active', b===btn));
      const isFree = MODE === 'free';
      document.getElementById('imgGuidedUI').style.display = isFree ? 'none' : 'block';
      document.getElementById('imgFreeUI').style.display = isFree ? 'block' : 'none';
      document.getElementById('shapeGuidedUI').style.display = isFree ? 'none' : 'block';
      document.getElementById('shapeFreeUI').style.display = isFree ? 'block' : 'none';
      document.getElementById('drawTab').style.display = isFree ? 'block' : 'none';
      // hide the layer not in use
      document.getElementById('imgGuideA').style.opacity = 0;
      document.getElementById('imgGuideB').style.opacity = 0;
      document.getElementById('imgFreeA').style.opacity = 0;
      document.getElementById('imgFreeB').style.opacity = 0;
      if(!isFree){
        applyGuidedImage(true);
        if(document.querySelector('#tabs .tab.active').dataset.tab === 'draw'){
          document.querySelector('#tabs .tab[data-tab="audio"]').click();
        }
      } else {
        applyFreeImageOpacities();
      }
    });
  });
 
  /* ============ ON/OFF TOGGLES ============ */
  function wireToggle(id, onLabel, offLabel, cb){
    const el = document.getElementById(id);
    let state = el.classList.contains('on');
    el.addEventListener('click', ()=>{
      state = !state;
      el.classList.toggle('on', state);
      el.querySelector('.lbl').textContent = state ? onLabel : offLabel;
      cb(state);
    });
    return ()=>state;
  }
 
  /* ============ AUDIO SETUP ============ */
  const TRACKS = [
    {id:'bungas',   name:'Bungas',            file:'bungas.mp3'},
    {id:'omnibuss', name:'Omnibuss',          file:'omnibuss.mp3'},
    {id:'apt',      name:'APT.',              file:'apt.mp3'},
    {id:'espresso', name:'Espresso',          file:'espresso.mp3'},
    {id:'meza',     name:'Mežā',              file:'meza.mp3'},
    {id:'zvanins',  name:'Zvaniņš skan',      file:'zvanins.mp3'},
  ];
 
  let audioCtx = null;
  const trackState = {};
 
  function ensureAudioCtx(){
    if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }
 
  const trackListEl = document.getElementById('trackList');
  TRACKS.forEach(t=>{
    const audioEl = new Audio(t.file);
    audioEl.loop = true;
    audioEl.crossOrigin = "anonymous";
    audioEl.preload = "none";
 
    const row = document.createElement('div');
    row.className = 'track';
    row.innerHTML = `
      <button class="playBtn" data-id="${t.id}">▶</button>
      <div class="tname">${t.name}</div>
      <div class="vizbar"><i></i></div>
      <input type="range" min="0" max="100" value="80" data-vol="${t.id}">
    `;
    trackListEl.appendChild(row);
 
    trackState[t.id] = {el:audioEl, analyser:null, dataArray:null, source:null, playing:false, bar:row.querySelector('.vizbar i')};
 
    row.querySelector('.playBtn').addEventListener('click', ()=>toggleTrack(t.id, row));
    row.querySelector('[data-vol]').addEventListener('input', e=>{ audioEl.volume = e.target.value/100; });
    audioEl.volume = 0.8;
  });
 
  function toggleTrack(id, row){
    ensureAudioCtx();
    const st = trackState[id];
    if(!st.source){
      st.source = audioCtx.createMediaElementSource(st.el);
      st.analyser = audioCtx.createAnalyser();
      st.analyser.fftSize = 64;
      st.dataArray = new Uint8Array(st.analyser.frequencyBinCount);
      st.source.connect(st.analyser);
      st.analyser.connect(audioCtx.destination);
    }
    if(st.playing){
      st.el.pause(); st.playing = false;
      row.classList.remove('playing'); row.querySelector('.playBtn').textContent = '▶';
    } else {
      st.el.play(); st.playing = true;
      row.classList.add('playing'); row.querySelector('.playBtn').textContent = '⏸';
    }
  }
 
  function getAudioEnergy(){
    let sum = 0, count = 0;
    Object.values(trackState).forEach(st=>{
      if(st.playing && st.analyser){
        st.analyser.getByteFrequencyData(st.dataArray);
        let s = 0;
        for(let i=0;i<st.dataArray.length;i++) s += st.dataArray[i];
        const avg = s / st.dataArray.length / 255;
        st.bar.style.height = Math.min(100, avg*160) + '%';
        sum += avg; count++;
      } else if(st.bar){ st.bar.style.height = '0%'; }
    });
    return count ? sum/count : 0;
  }
 
  /* ============ BACKGROUND LAYER ============ */
  const bgLayer = document.getElementById('bgLayer');
  const BG_PRESETS = [
    {label:'Nakts',  css:'linear-gradient(160deg,#0d1b2a,#1F4E79)'},
    {label:'Ugunskrāsa', css:'linear-gradient(160deg,#3a0f00,#C75000)'},
    {label:'Mežs',   css:'linear-gradient(160deg,#0b2a1a,#1e5c3a)'},
    {label:'Saullēkts', css:'linear-gradient(160deg,#4b0f5c,#e8722c)'},
    {label:'Okeāns', css:'linear-gradient(160deg,#001a2b,#0077a8)'},
    {label:'Melns',  css:'#050505'},
    {label:'Balts',  css:'#f1ede4'},
  ];
  const bgSwatchesEl = document.getElementById('bgSwatches');
  BG_PRESETS.forEach((p,i)=>{
    const sw = document.createElement('div');
    sw.className = 'swatch' + (i===0?' selected':'');
    sw.style.background = p.css;
    sw.textContent = p.label;
    sw.style.fontWeight = 'bold';
    sw.style.textShadow = '0 1px 2px rgba(0,0,0,.6)';
    sw.addEventListener('click', ()=>{
      bgLayer.style.background = p.css;
      [...bgSwatchesEl.children].forEach(c=>c.classList.remove('selected'));
      sw.classList.add('selected');
    });
    bgSwatchesEl.appendChild(sw);
  });
  bgLayer.style.background = BG_PRESETS[0].css;
  document.getElementById('bgCustom').addEventListener('input', e=>{
    bgLayer.style.background = e.target.value;
    [...bgSwatchesEl.children].forEach(c=>c.classList.remove('selected'));
  });
 
  /* ============ IMAGE DATA ============ */
  const IMAGES = [
    {id:'vasara-01', cat:'vasara', label:'Vasara 1'},

  /* ---- guided particle system ---- */
  let particles = [];
  let lastSpawn = 0;
  function spawnParticle(){
    const w = canvas.width, h = canvas.height;
    const life = guideMotion==='sides' ? 2600/shapeSpeedFactor : guideMotion==='spiral' ? 3200/shapeSpeedFactor : 2200/shapeSpeedFactor;
    let p = {birth: performance.now(), life, motion: guideMotion};
    if(guideMotion === 'sides'){
      const edge = Math.floor(Math.random()*4);
      const along = Math.random();
      if(edge===0){ p.sx=-0.05*w; p.sy=along*h; p.ex=1.05*w; p.ey=along*h; }
      else if(edge===1){ p.sx=1.05*w; p.sy=along*h; p.ex=-0.05*w; p.ey=along*h; }
      else if(edge===2){ p.sx=along*w; p.sy=-0.05*h; p.ex=along*w; p.ey=1.05*h; }
      else { p.sx=along*w; p.sy=1.05*h; p.ex=along*w; p.ey=-0.05*h; }
      p.r = Math.min(w,h)*0.02*(0.6+Math.random()*0.8);
    } else if(guideMotion === 'spiral'){
      p.angleStart = Math.random()*Math.PI*2;
      p.r = Math.min(w,h)*0.018*(0.6+Math.random()*0.8);
    } else {
      const corner = Math.floor(Math.random()*4);
      const corners = [[0,0],[w,0],[0,h],[w,h]];
      p.sx = corners[corner][0]; p.sy = corners[corner][1];
      p.ex = w/2; p.ey = h/2;
      p.r = Math.min(w,h)*0.035*(0.6+Math.random()*0.8);
    }
    particles.push(p);
  }
  function drawGuidedParticles(energy){
    const now = performance.now();
    const spawnInterval = 260/shapeSpeedFactor * (shapeReactiveGuideBoost(energy));
    if(now - lastSpawn > spawnInterval){ spawnParticle(); lastSpawn = now; }
    particles = particles.filter(p => (now-p.birth) < p.life);
    ctx.globalAlpha = 1;
    particles.forEach(p=>{
      const frac = (now-p.birth)/p.life;
      let x,y,r,alpha;
      if(p.motion==='sides'){
        x = p.sx + (p.ex-p.sx)*frac;
        y = p.sy + (p.ey-p.sy)*frac;
        r = p.r;
        alpha = Math.sin(frac*Math.PI);
      } else if(p.motion==='spiral'){
        const w=canvas.width,h=canvas.height;
        const maxR = Math.min(w,h)*0.45;
        const rr = maxR*frac;
        const ang = p.angleStart + frac*Math.PI*4;
        x = w/2 + Math.cos(ang)*rr;
        y = h/2 + Math.sin(ang)*rr;
        r = p.r*(1-frac*0.4);
        alpha = 1-frac;
      } else {
        x = p.sx + (p.ex-p.sx)*frac;
        y = p.sy + (p.ey-p.sy)*frac;
        r = p.r*(1-frac*0.85);
        alpha = 1-frac*0.3;
      }
      ctx.globalAlpha = Math.max(0,alpha)*shapeOpacity;
      ctx.beginPath();
      ctx.arc(x,y,Math.max(1,r),0,Math.PI*2);
      ctx.fillStyle = hexToRgba(shapeColor,1);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }
  function shapeReactiveGuideBoost(energy){ return Math.max(0.4, 1-energy*0.7); }
 
  /* ---- free mode geometric shapes ---- */
  function drawFreeShapes(energy){
    const w = canvas.width, h = canvas.height;
    if(shapeType === 'none') return;
    ctx.globalAlpha = shapeOpacity;
    const pulse = shapeReactive ? energy : 0.35;
    const boost = 1 + pulse*2.2;
 
    if(shapeType === 'circles' || shapeType === 'rings'){
      for(let i=0;i<shapeCount;i++){
        const angle = (i/shapeCount)*Math.PI*2 + t*0.4;
        const radius = Math.min(w,h)*0.32*boost;
        const cx = w/2 + Math.cos(angle)*radius*0.5;
        const cy = h/2 + Math.sin(angle)*radius*0.5;
        const r = (Math.min(w,h)*0.02 + pulse*Math.min(w,h)*0.05) * (1+0.3*Math.sin(t*3+i));
        ctx.beginPath();
        ctx.arc(cx, cy, Math.max(2,r), 0, Math.PI*2);
        if(shapeType==='rings'){ ctx.strokeStyle = hexToRgba(shapeColor,1); ctx.lineWidth = 3 + pulse*6; ctx.stroke(); }
        else { ctx.fillStyle = hexToRgba(shapeColor,1); ctx.fill(); }
      }
    } else if(shapeType === 'triangles'){
      for(let i=0;i<shapeCount;i++){
        const angle = (i/shapeCount)*Math.PI*2 + t*0.3;
        const radius = Math.min(w,h)*0.3*boost;
        const cx = w/2 + Math.cos(angle)*radius;
        const cy = h/2 + Math.sin(angle)*radius;
        const size = Math.min(w,h)*0.03*(1+pulse*1.5);
        ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle + t);
        ctx.beginPath(); ctx.moveTo(0,-size); ctx.lineTo(size,size); ctx.lineTo(-size,size); ctx.closePath();
        ctx.fillStyle = hexToRgba(shapeColor,1); ctx.fill(); ctx.restore();
      }
    } else if(shapeType === 'waves'){
      const lines = Math.max(2, Math.round(shapeCount/4));
      ctx.strokeStyle = hexToRgba(shapeColor,1);
      ctx.lineWidth = 2 + pulse*5;
      for(let l=0;l<lines;l++){
        ctx.beginPath();
        const yBase = h*(0.25 + l*(0.5/lines));
        for(let x=0;x<=w;x+=8){
          const y = yBase + Math.sin(x*0.02 + t*2 + l)* (20+pulse*80);
          if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
    } else if(shapeType === 'lines'){
      ctx.strokeStyle = hexToRgba(shapeColor,1);
      for(let i=0;i<shapeCount;i++){
        const x = (i/shapeCount)*w;
        const height = h*0.15 + pulse*h*0.35*Math.abs(Math.sin(i+t*3));
        ctx.lineWidth = Math.max(2, (w/shapeCount)*0.5);
        ctx.beginPath(); ctx.moveTo(x, h/2 - height/2); ctx.lineTo(x, h/2 + height/2); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
  }

  function getPos(e){
    const rect = drawCanvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;

      row.classList.remove('playing'); row.querySelector('.playBtn').textContent = '▶';
    });
    bgLayer.style.background = BG_PRESETS[0].css;
    [...bgSwatchesEl.children].forEach((c,i)=>c.classList.toggle('selected', i===0));
    colorOpacity.value = 40; colorVisible = false;
    document.getElementById('colorToggle').classList.remove('on');
    document.getElementById('colorToggle').querySelector('.lbl').textContent = 'Paslēpts';
    updateColorOverlay();
    particles = [];
    dctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
    shapeType = 'circles';
    document.querySelectorAll('#shapeChoices .choice').forEach(b=>b.classList.toggle('selected', b.dataset.shape==='circles'));
  });
 
})();
</script>
</body>
</html>
